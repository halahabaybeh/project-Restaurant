<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <link href="./assets/css/output.css" rel="stylesheet">
    <link href="./assets/css/input.css" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <header class="border-b border-gray-border">
        <div class="container flex items-center justify-between py-4.5">
            <div class="menu sm:hidden">
                <a href="#"><img src="./assets/img/header/menu.svg" alt="menu"></a>
            </div>

            <div class="logo"><a class="uppercase text-xl text-primary">Taste</a></div>
            <div class="profile_photo sm:hidden">
                <a href="#"><img src="./assets/img/header/profile.png" alt="profile"></a>
            </div>
            <div class="list max-sm:hidden">
                <ul class="flex justify-center items-center gap-6">
                    <li>
                        <a href="#" class="nav-link">Menu</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link">Wishlist</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link">Orders</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link">Account</a>
                    </li>
                </ul>
            </div>
            <div class="icon flex items-center gap-4 max-sm:hidden">
                <a href="#"><img src="./assets/img/header/search.svg" alt="search"></a>
                <a href="#"><img src="./assets/img/header/bag-shopping.svg" alt="shopping bag"></a>
            </div>
        </div>

    </header>
    <section class="hero container min-h-[calc(100vh-70px)] grid grid-cols-2  items-center">

        <div class="details-hero flex flex-col gap-4 ">
            <p class="uppercase text-primary text-sm font-inter">University Course Project</p>
            <h2 class="font-inter text-hover text-5xl ">Experience the taste of perfection</h2>
            <p class="font-inter text-secondary text-lg">A curated digital menu featuring the finest ingredients and culinary techniques.</p>
            <div class="btn flex gap-4">
                <a href="#" class="btn-primary">View Menu</a>
                <a href="#" class="btn-secondary sm:hidden">Book a Table</a>
            </div>
        </div>
        <div class="img-hero flex justify-end items-center ">
            <img src="./assets/img/hero/Gourmetdish.png" alt="img" class=" sm:hidden md:block" />
            <img src="./assets/img/hero/Artisandish.png" alt="img" class="hidden sm:block md:hidden" />
        </div>


    </section>

</body>

</html>
